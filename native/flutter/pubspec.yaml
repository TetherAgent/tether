name: tether
description: "Tether Flutter client — remote agent session viewer and controller."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  xterm: ^4.0.0
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.2
  shared_preferences: ^2.3.0
  web_socket_client: ^0.2.1
  go_router: ^14.0.0
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_markdown: ^0.7.6

dependency_overrides:
  flutter_secure_storage_ohos: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
