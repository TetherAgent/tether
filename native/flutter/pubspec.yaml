name: tether
description: "Tether Flutter client — remote agent session console"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Terminal widget (pure Dart, HarmonyOS-compatible)
  xterm: ^4.0.0

  # Auth token storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: ^9.2.1
  # Locale + theme preference
  shared_preferences: ^2.3.2

  # Networking
  web_socket_channel: ^3.0.1
  http: ^1.2.2

  # Navigation — StatefulShellRoute for bottom tab bar
  go_router: ^14.6.2

  # State management
  provider: ^6.1.2

  # Markdown rendering (chat view)
  flutter_markdown: ^0.7.4

  # i18n
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
