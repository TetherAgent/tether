server {
    listen 80;
    server_name tether.fundingrate.cn tether.earntools.me;

    root /data/tether/apps/web/dist;
    index index.html;

    # relay → server 内部同步接口，只允许 127.0.0.1 调用
    location /api/relay/runtime-sync/ {
        # allow 127.0.0.1;
        # deny all;
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # session API 走 server（/api/server/ 前缀，前端只读）
    location /api/server/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 后端 API（用户认证 / admin 登录注册等）
    location /api/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Admin Web 静态文件（SPA 兜底）
    location = /admin/index.html {
        alias /data/tether/apps/admin-web/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /admin/sw.js {
        alias /data/tether/apps/admin-web/dist/sw.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /admin/manifest.webmanifest {
        alias /data/tether/apps/admin-web/dist/manifest.webmanifest;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ^~ /admin/assets/ {
        alias /data/tether/apps/admin-web/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location ^~ /admin/ {
        alias /data/tether/apps/admin-web/dist/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /admin/index.html;
    }

    # /admin 无尾部斜杠跳转
    location = /admin {
        return 301 /admin/;
    }

    # Gateway WebSocket
    location /ws/gateway {
        proxy_pass http://127.0.0.1:4889/ws/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /ws/client {
        proxy_pass http://127.0.0.1:4889/ws/client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 主站 SPA 兜底
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /sw.js =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /manifest.webmanifest =404;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
