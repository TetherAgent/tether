server {
    listen 80;
    server_name tether.earntools.me;

    root /Users/dream/code/tether/apps/web/dist;
    index index.html;

    # Admin API（比 /admin 更长，优先匹配）
    location /admin/api/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后端 API（用户认证 / admin 登录注册等）
    location /api/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin Web 静态文件（SPA 兜底）
    location /admin {
        alias /Users/dream/code/tether/apps/admin-web/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # Gateway WebSocket
    location /gateway {
        proxy_pass http://127.0.0.1:4889/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /client {
        proxy_pass http://127.0.0.1:4889/client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
