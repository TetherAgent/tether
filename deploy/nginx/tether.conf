server {
    listen 80;
    server_name tether.earntools.me;

    root /data/tether/apps/web/dist;
    index index.html;

    # Phase 12: runtime-sync 内部接口，只允许 Relay（127.0.0.1）调用
    location /api/runtime-sync/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # session API 走 server（/api/server/ 前缀，前端只读）
    location /api/server/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 后端 API（用户认证 / admin 登录注册等）
    location /api/ {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Admin Web 静态文件（SPA 兜底）
    location ^~ /admin/ {
        alias /data/tether/apps/admin-web/dist/;
        try_files $uri $uri/ /admin/index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # /admin 无尾部斜杠跳转
    location = /admin {
        return 301 /admin/;
    }

    # Gateway WebSocket
    location /gateway {
        proxy_pass http://127.0.0.1:4889/gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /client {
        proxy_pass http://127.0.0.1:4889/client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 主站 SPA 兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}
