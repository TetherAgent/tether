name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "部署目标"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - web
          - server
          - relay
          - web-only
          - admin
      branch:
        description: "要部署的分支"
        required: true
        default: "main"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}

    steps:
      - name: Run deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DEPLOY_BRANCH,DEPLOY_TARGET
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.SERVER_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/data/tether"
            fi

            cd "$DEPLOY_PATH"
            bash deploy/deploy.sh "$DEPLOY_BRANCH" "$DEPLOY_TARGET"
