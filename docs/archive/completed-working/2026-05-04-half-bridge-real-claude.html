<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tether — PTY 半桥渲染（真实数据 + 调试视图）</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<style>
  :root { color-scheme: dark; --bg:#0a0a0a; --surface:#18181b; --border:#27272a;
    --text:#fafafa; --text-2:#a1a1aa; --text-3:#71717a; --brand:#6366f1; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;
    background:var(--bg); color:var(--text); font-size:13px; line-height:1.55; }
  .app { height: 100vh; display: flex; flex-direction: column; }
  .header { padding:10px 14px; border-bottom:1px solid var(--border);
    background:var(--surface); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .header h1 { font-size:14px; font-weight:600; margin:0; }
  .badge { background:rgba(99,102,241,0.15); color:var(--brand);
    padding:2px 8px; border-radius:10px; font-size:10.5px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.04em; }
  button, label.file-btn { background:var(--brand); border:none; color:white;
    padding:6px 12px; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer;
    font-family:inherit; }
  button.secondary { background:transparent; border:1px solid var(--border); color:var(--text-2); }
  .grid { flex:1; min-height:0; display:grid;
    grid-template-columns: 1fr 1fr 1.2fr; gap:1px; background:var(--border); }
  .pane { background:var(--surface); display:flex; flex-direction:column; min-height:0; overflow:hidden; }
  .pane-header { padding:6px 12px; background:#23232a; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; flex-shrink:0; font-size:11.5px; }
  .pane-tag { padding:1px 7px; border-radius:3px; font-size:10px; font-weight:700;
    letter-spacing:0.04em; color:white; }
  .pane-tag.s1 { background:#6b7280; }
  .pane-tag.s2 { background:#ec4899; }
  .pane-tag.s3 { background:#6366f1; }
  .pane-name { font-weight:600; }
  .pane-desc { font-size:10.5px; color:var(--text-3); margin-left:auto; }
  .pane-body { flex:1; min-height:0; overflow-y:auto; padding:10px 12px; }

  .lines-list, .events-list { font-family:'SF Mono',Menlo,Consolas,monospace;
    font-size:11px; line-height:1.6; white-space:pre-wrap; word-break:break-all; }
  .lines-list .line { padding:2px 4px; border-bottom:1px dashed rgba(255,255,255,0.04); }
  .lines-list .line.empty { color:var(--text-3); font-style:italic; }
  .lines-list .line.skip { color:#7f1d1d; opacity:0.5; }
  .events-list .ev { padding:6px 8px; border-radius:4px; margin-bottom:4px;
    background:rgba(255,255,255,0.03); border-left:3px solid var(--text-3); }
  .events-list .ev.system { border-left-color:#6b7280; }
  .events-list .ev.user { border-left-color:#22c55e; }
  .events-list .ev.assistant { border-left-color:#c084fc; }
  .events-list .ev.tool { border-left-color:#fbbf24; background:rgba(251,191,36,0.05); }
  .events-list .ev .ev-type { font-weight:700; color:var(--brand); font-size:10px;
    text-transform:uppercase; letter-spacing:0.04em; }

  /* 草图 F 渲染 */
  .chat-stream { display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:6px; align-items:flex-start; }
  .row.user { flex-direction:row-reverse; }
  .row.system { justify-content:center; }
  .avatar { width:26px; height:26px; border-radius:5px; flex-shrink:0; display:flex;
    align-items:center; justify-content:center; font-size:11px; font-weight:600; color:white; }
  .avatar.user { background:linear-gradient(135deg,#fbbf24,#f59e0b); }
  .avatar.agent { background:linear-gradient(135deg,#c084fc,#6366f1); }
  .bubble-col { max-width:calc(100% - 36px); display:flex; flex-direction:column; gap:3px; }
  .row.user .bubble-col { align-items:flex-end; }
  .bubble { padding:7px 11px; border-radius:7px; word-wrap:break-word; font-size:12px; }
  .bubble.user { background:#22c55e; color:#052e16; border-top-right-radius:2px; }
  .bubble.agent { background:#1f1f23; color:var(--text); border:1px solid var(--border);
    border-top-left-radius:2px; white-space:pre-wrap; }
  .tool-card { background:#1e1b3a; border:1px solid #312e81; border-radius:7px;
    overflow:hidden; border-top-left-radius:2px; }
  .tool-card-header { display:flex; align-items:center; gap:6px; padding:6px 10px;
    cursor:pointer; user-select:none; }
  .tool-icon { font-family:'SF Mono',Menlo,monospace; font-size:9.5px; font-weight:700;
    color:#818cf8; background:rgba(99,102,241,0.12); padding:1px 5px; border-radius:3px;
    flex-shrink:0; }
  .tool-name { font-weight:600; font-size:11.5px; }
  .tool-args-inline { color:var(--text-2); font-family:'SF Mono',Menlo,monospace; font-size:10.5px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  details[open] .tool-chevron { transform:rotate(90deg); }
  .tool-chevron { color:var(--text-3); transition:transform 0.15s; flex-shrink:0; font-size:11px; }
  .tool-card-body { padding:0 10px 8px; border-top:1px dashed #312e81;
    margin-top:3px; padding-top:6px; }
  .tool-result { background:#052e1a; border:1px solid #14532d; border-radius:5px;
    padding:6px 8px; font-family:'SF Mono',Menlo,monospace; font-size:10.5px;
    color:var(--text-2); max-height:160px; overflow-y:auto; white-space:pre-wrap; }
  .tool-result-header { color:#34d399; font-weight:600; font-size:10px;
    margin-bottom:3px; text-transform:uppercase; letter-spacing:0.04em; }
  .system-msg { text-align:center; color:var(--text-3); font-size:10.5px;
    padding:3px 10px; background:rgba(255,255,255,0.05); border-radius:10px; }

  .stats { padding:8px 14px; background:rgba(99,102,241,0.08);
    border-top:1px solid var(--border); font-size:11px; color:var(--text-2);
    font-family:'SF Mono',Menlo,monospace; }
  .stats strong { color:var(--brand); }
  .empty-msg { color:var(--text-3); font-style:italic; padding:20px; text-align:center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Tether 半桥</h1>
    <span class="badge">PTY → 草图 F</span>
    <div style="margin-left:auto; display:flex; gap:6px;">
      <button id="run-claude">▶ 真实 Claude (30 KB)</button>
      <button id="run-codex">▶ 真实 Codex (33 KB)</button>
      <label class="file-btn">📁 自定义</label>
      <input type="file" id="file" style="display:none;" accept=".bin,.txt,.log" />
      <button class="secondary" id="reset">↻</button>
    </div>
  </div>

  <div class="grid">
    <div class="pane">
      <div class="pane-header">
        <span class="pane-tag s1">1</span>
        <span class="pane-name">extractCleanLines</span>
        <span class="pane-desc">xterm headless onLineFeed</span>
      </div>
      <div class="pane-body" id="pane-lines"></div>
    </div>
    <div class="pane">
      <div class="pane-header">
        <span class="pane-tag s2">2</span>
        <span class="pane-name">parseClaudeLines</span>
        <span class="pane-desc">正则识别 ❯ ● ⎿</span>
      </div>
      <div class="pane-body" id="pane-events"></div>
    </div>
    <div class="pane">
      <div class="pane-header">
        <span class="pane-tag s3">3</span>
        <span class="pane-name">renderEvents (草图 F)</span>
        <span class="pane-desc">→ 手机最终看到</span>
      </div>
      <div class="pane-body" id="pane-chat"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>
</div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function bytesToString(bytes) {
  return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
}

function extractCleanLines(rawStr) {
  const term = new Terminal({ cols: 200, rows: 50, scrollback: 500, convertEol: true });
  const lines = [];
  term.onLineFeed(() => {
    const buf = term.buffer.active;
    const y = buf.baseY + buf.cursorY - 1;
    if (y < 0) return;
    const text = buf.getLine(y)?.translateToString(true) ?? '';
    lines.push(text);
  });
  return new Promise(resolve => {
    term.write(rawStr, () => {
      const buf = term.buffer.active;
      const last = buf.getLine(buf.baseY + buf.cursorY)?.translateToString(true) ?? '';
      if (last.trim()) lines.push(last);
      term.dispose();
      resolve(lines);
    });
  });
}

    const line = lines[i];
    const trimmed = line.trim();

    if (!trimmed) { i++; continue; }
    if (/^[─━│╭╮╰╯└├┘┐┌▏▕▔▁▌█▐▘▝▖▗▜▛]/.test(trimmed)) {
      events.push({ type: 'skip', text: trimmed.slice(0, 60), reason: 'TUI box' });
      i++; continue;
    }
    if (trimmed.startsWith('✻')) {
      events.push({ type: 'system', text: trimmed });
      i++; continue;
    }
    const userMatch = line.match(/^[\s>]*[❯>]\s+(.+)$/);
    if (userMatch) {
      events.push({ type: 'user', text: userMatch[1].trim() });
      i++; continue;
    }
    const toolMatch = line.match(/^\s*●\s+(\w+)\(([^)]*)\)\s*$/);
    if (toolMatch) {
      const name = toolMatch[1];
      const args = toolMatch[2];
      const results = [];
      i++;
      while (i < lines.length) {
        const next = lines[i];
        if (/^\s+⎿/.test(next)) {
          results.push(next.replace(/^\s+⎿\s*/, ''));
          i++;
        } else if (/^\s{5,}\S/.test(next) && results.length > 0) {
          results.push(next.replace(/^\s+/, ''));
          i++;
        } else break;
      }
      events.push({ type: 'tool', name, args, results });
      continue;
    }
    if (trimmed.length > 1) {
      events.push({ type: 'assistant', text: trimmed });
    }
    i++;
  }
  // 合并连续 assistant
  const merged = [];
  for (const ev of events) {
    if (ev.type === 'assistant' && merged.length > 0
        && merged[merged.length - 1].type === 'assistant') {
      merged[merged.length - 1].text += '\n' + ev.text;
    } else {
      merged.push(ev);
    }
  }
  return merged;
}

function showLines(lines) {
  const pane = document.getElementById('pane-lines');
  pane.innerHTML = '';
  if (lines.length === 0) {
    pane.innerHTML = '<div class="empty-msg">无行</div>';
    return;
  }
  const list = document.createElement('div');
  list.className = 'lines-list';
  for (const l of lines) {
    const div = document.createElement('div');
    div.className = 'line';
    if (!l.trim()) { div.classList.add('empty'); div.textContent = '∅'; }
    else div.textContent = l;
    list.appendChild(div);
  }
  pane.appendChild(list);
}

function showEvents(events) {
  const pane = document.getElementById('pane-events');
  pane.innerHTML = '';
  if (events.length === 0) {
    pane.innerHTML = '<div class="empty-msg">未识别任何事件</div>';
    return;
  }
  const list = document.createElement('div');
  list.className = 'events-list';
  for (const ev of events) {
    const div = document.createElement('div');
    div.className = 'ev ' + ev.type;
    let body = '';
    if (ev.type === 'tool') {
      body = `<div class="ev-type">tool · ${ev.name}</div>(${ev.args})\n` +
             ev.results.map(r => '  ⎿ ' + r).join('\n');
    } else if (ev.type === 'skip') {
      body = `<div class="ev-type">skip · ${ev.reason}</div>${ev.text}`;
    } else {
      body = `<div class="ev-type">${ev.type}</div>${ev.text}`;
    }
    div.innerHTML = body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/<div/g,'<div').replace(/<\/div>/g,'</div>');
    div.innerHTML = body;
    list.appendChild(div);
  }
  pane.appendChild(list);
}

function renderChat(events) {
  const pane = document.getElementById('pane-chat');
  pane.innerHTML = '';
  const stream = document.createElement('div');
  stream.className = 'chat-stream';
  const visibleEvents = events.filter(e => e.type !== 'skip');
  if (visibleEvents.length === 0) {
    pane.innerHTML = '<div class="empty-msg">无可渲染事件</div>';
    return;
  }
  for (const ev of visibleEvents) {
    if (ev.type === 'system') {
      const row = document.createElement('div');
      row.className = 'row system';
      const m = document.createElement('div');
      m.className = 'system-msg';
      m.textContent = ev.text;
      row.appendChild(m);
      stream.appendChild(row);
      continue;
    }
    const row = document.createElement('div');
    row.className = `row ${ev.type === 'user' ? 'user' : 'agent'}`;
    const av = document.createElement('div');
    av.className = `avatar ${ev.type === 'user' ? 'user' : 'agent'}`;
    av.textContent = ev.type === 'user' ? '我' : 'C';
    row.appendChild(av);
    const col = document.createElement('div');
    col.className = 'bubble-col';
    if (ev.type === 'tool') {
      const card = document.createElement('details');
      card.className = 'tool-card';
      card.open = true;
      const summary = ev.results[0] || '...';
      const body = ev.results.length > 1 ? ev.results.slice(1).join('\n') : '';
      card.innerHTML = `
        <summary class="tool-card-header" style="list-style:none;">
          <span class="tool-icon">${ev.name.toUpperCase()}</span>
          <span class="tool-name">${ev.name}</span>
          <span class="tool-args-inline">${ev.args || ''}</span>
          <span class="tool-chevron">›</span>
        </summary>
        <div class="tool-card-body">
          <div class="tool-result">
            <div class="tool-result-header">✓ ${summary}</div>${body.replace(/</g, '&lt;')}
          </div>
        </div>`;
      col.appendChild(card);
    } else {
      const b = document.createElement('div');
      b.className = `bubble ${ev.type === 'user' ? 'user' : 'agent'}`;
      b.textContent = ev.text;
      col.appendChild(b);
    }
    row.appendChild(col);
    stream.appendChild(row);
  }
  pane.appendChild(stream);
}

async function processBytes(rawStr, sourceName) {
  const t0 = performance.now();
  const lines = await extractCleanLines(rawStr);
  const t1 = performance.now();
  showLines(lines);
  const events = parseClaudeLines(lines);
  const t2 = performance.now();
  showEvents(events);
  renderChat(events);
  const t3 = performance.now();

  const counts = events.reduce((a, e) => { a[e.type] = (a[e.type] || 0) + 1; return a; }, {});
  document.getElementById('stats').innerHTML = `
    <strong>${sourceName}</strong> · ${rawStr.length} chars →
    extract: <strong>${(t1-t0).toFixed(0)}ms</strong> · parse: <strong>${(t2-t1).toFixed(0)}ms</strong> · render: <strong>${(t3-t2).toFixed(0)}ms</strong>
    · 干净行 <strong>${lines.length}</strong>
    · 事件 <strong>${events.length}</strong>
    (${Object.entries(counts).map(([k,v])=>k+'='+v).join(', ')})
  `;
}

function reset() {
  document.getElementById('pane-lines').innerHTML = '';
  document.getElementById('pane-events').innerHTML = '';
  document.getElementById('pane-chat').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
}

document.getElementById('run-claude').addEventListener('click', async () => {
  reset();
  await processBytes(bytesToString(b64ToBytes(CLAUDE_B64)), 'Claude (claude-recent.bin)');
});
document.getElementById('run-codex').addEventListener('click', async () => {
  reset();
  await processBytes(bytesToString(b64ToBytes(CODEX_B64)), 'Codex (codex-recent.bin)');
});
document.getElementById('reset').addEventListener('click', reset);
document.getElementById('file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  reset();
  const buf = await file.arrayBuffer();
  await processBytes(bytesToString(new Uint8Array(buf)), file.name);
});

window.addEventListener('load', () => setTimeout(() => {
  document.getElementById('run-claude').click();
}, 300));
</script>
